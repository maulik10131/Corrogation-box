<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Background gradient – cool light blue -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D2ECFA"/>
      <stop offset="50%"  stop-color="#C2E3F5"/>
      <stop offset="100%" stop-color="#AED5ED"/>
    </linearGradient>

    <!-- Ambient glow: teal side -->
    <radialGradient id="glowLeft" cx="20%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#7EC0B8" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#C2E3F5" stop-opacity="0"/>
    </radialGradient>
    <!-- Ambient glow: beige side -->
    <radialGradient id="glowRight" cx="80%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#D4B890" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#C2E3F5" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for both boxes -->
    <filter id="boxShadow" x="-25%" y="-10%" width="150%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#3A7898" flood-opacity="0.22"/>
    </filter>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="22" r="1.5" fill="#7AAEC8" fill-opacity="0.2"/>
    </pattern>

    <!-- ── TEAL cube gradients ── -->
    <linearGradient id="tTop"   x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#C8DED9"/>
      <stop offset="100%" stop-color="#A8C9C3"/>
    </linearGradient>
    <linearGradient id="tLeft"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#96BEB8"/>
      <stop offset="100%" stop-color="#749E98"/>
    </linearGradient>
    <linearGradient id="tRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6E9C96"/>
      <stop offset="100%" stop-color="#588A85"/>
    </linearGradient>

    <!-- Clip path for teal front-left face -->
    <clipPath id="tealFaceClip">
      <polygon points="0,133 230,265 230,532 0,399"/>
    </clipPath>

    <!-- ── BEIGE cube gradients ── -->
    <linearGradient id="bTop"   x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#F0E4CE"/>
      <stop offset="100%" stop-color="#DBC9AF"/>
    </linearGradient>
    <linearGradient id="bLeft"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D4C0A4"/>
      <stop offset="100%" stop-color="#BEAA8E"/>
    </linearGradient>
    <linearGradient id="bRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#BAA88E"/>
      <stop offset="100%" stop-color="#A89478"/>
    </linearGradient>

    <!-- Clip path for beige front-left face -->
    <clipPath id="beigeFaceClip">
      <polygon points="0,133 230,265 230,532 0,399"/>
    </clipPath>
  </defs>

  <!-- ░░ BACKGROUND LAYERS ░░ -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <rect width="1920" height="1080" fill="url(#glowLeft)"/>
  <rect width="1920" height="1080" fill="url(#glowRight)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>


  <!-- ░░ SMALL FLOATING MINI-BOXES ░░ -->
  <!-- Each mini-box = isometric 3-face shape, bobs up-down via SMIL animateTransform -->
  <!-- Base geometry unit: top="23,0 46,13 23,26 0,13" left="0,13 23,26 23,53 0,40" right="23,26 46,13 46,40 23,53" -->

  <!-- Mini-box 1 — teal, top-left, scale 32px, bob 4s -->
  <g transform="translate(115, 72)" opacity="0.55">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-9; 0,0" dur="4s" begin="0s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#B8D4CE"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#8AB4AE"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#6E9C96"/>
  </g>

  <!-- Mini-box 2 — beige, top area, scale 26px, bob 5.2s -->
  <g transform="translate(375, 38)" opacity="0.50">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-7; 0,0" dur="5.2s" begin="0.6s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#E4D4B8"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#C8B494"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#B49A78"/>
  </g>

  <!-- Mini-box 3 — teal, top centre-left, scale 22px, bob 3.6s -->
  <g transform="translate(618, 44)" opacity="0.45">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-6; 0,0" dur="3.6s" begin="1.1s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#A8CCCA"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#7EB0AA"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#629690"/>
  </g>

  <!-- Mini-box 4 — beige, top centre-right, scale 20px, bob 4.8s -->
  <g transform="translate(1160, 52)" opacity="0.48">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-7; 0,0" dur="4.8s" begin="0.3s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#E4D4B8"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#C8B494"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#B49A78"/>
  </g>

  <!-- Mini-box 5 — teal, top-right, scale 30px, bob 3.9s -->
  <g transform="translate(1480, 38)" opacity="0.52">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-8; 0,0" dur="3.9s" begin="1.8s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#B8D4CE"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#8AB4AE"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#6E9C96"/>
  </g>

  <!-- Mini-box 6 — beige, far top-right, scale 24px, bob 5.5s -->
  <g transform="translate(1760, 68)" opacity="0.46">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-6; 0,0" dur="5.5s" begin="0.9s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#E4D4B8"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#C8B494"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#B49A78"/>
  </g>

  <!-- Mini-box 7 — teal, left mid-height, scale 28px, bob 4.4s -->
  <g transform="translate(58, 440)" opacity="0.48">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-8; 0,0" dur="4.4s" begin="2.2s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#B8D4CE"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#8AB4AE"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#6E9C96"/>
  </g>

  <!-- Mini-box 8 — beige, right mid-height, scale 26px, bob 5s -->
  <g transform="translate(1848, 360)" opacity="0.46">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-7; 0,0" dur="5s" begin="0.4s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#E4D4B8"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#C8B494"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#B49A78"/>
  </g>

  <!-- Mini-box 9 — teal, bottom-left, scale 34px, bob 4.1s -->
  <g transform="translate(88, 880)" opacity="0.50">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-9; 0,0" dur="4.1s" begin="1.4s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#A8CCCA"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#7EB0AA"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#629690"/>
  </g>

  <!-- Mini-box 10 — beige, bottom centre-left, scale 28px, bob 3.8s -->
  <g transform="translate(430, 960)" opacity="0.45">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-8; 0,0" dur="3.8s" begin="2.5s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#E4D4B8"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#C8B494"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#B49A78"/>
  </g>

  <!-- Mini-box 11 — teal, bottom centre, scale 22px, bob 5.8s -->
  <g transform="translate(920, 990)" opacity="0.42">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-6; 0,0" dur="5.8s" begin="0.7s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#B8D4CE"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#8AB4AE"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#6E9C96"/>
  </g>

  <!-- Mini-box 12 — beige, bottom centre-right, scale 30px, bob 4.6s -->
  <g transform="translate(1340, 970)" opacity="0.48">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-8; 0,0" dur="4.6s" begin="1.6s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#E4D4B8"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#C8B494"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#B49A78"/>
  </g>

  <!-- Mini-box 13 — teal, bottom-right, scale 32px, bob 4.3s -->
  <g transform="translate(1760, 900)" opacity="0.50">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-9; 0,0" dur="4.3s" begin="0.2s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#B8D4CE"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#8AB4AE"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#6E9C96"/>
  </g>

  <!-- Mini-box 14 — beige, right side mid-low, scale 24px, bob 6s -->
  <g transform="translate(1870, 640)" opacity="0.44">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-7; 0,0" dur="6s" begin="1.3s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#E4D4B8"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#C8B494"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#B49A78"/>
  </g>

  <!-- Mini-box 15 — teal, left side mid-low, scale 20px, bob 5.2s -->
  <g transform="translate(42, 680)" opacity="0.42">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0,0; 0,-6; 0,0" dur="5.2s" begin="2.0s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="23,0 46,13 23,26 0,13"    fill="#A8CCCA"/>
    <polygon points="0,13 23,26 23,53 0,40"    fill="#7EB0AA"/>
    <polygon points="23,26 46,13 46,40 23,53"  fill="#629690"/>
  </g>


  <!-- ═══════════════════════════════════════════════ -->
  <!--  BOX 1 – TEAL CUBE  (left side, equal gap)    -->
  <!--  scale=1.4 → 644px wide; right edge ≈ 624     -->
  <!--  Gap to card centre ≈ 112px same as right side -->
  <!-- ═══════════════════════════════════════════════ -->
  <g transform="translate(-20, 128) scale(1.4)" filter="url(#boxShadow)">

    <!-- Ground shadow ellipse -->
    <ellipse cx="230" cy="546" rx="220" ry="26" fill="#2A6880" fill-opacity="0.12"/>

    <!-- TOP face -->
    <polygon points="230,0  460,133  230,265  0,133" fill="url(#tTop)"/>
    <!-- Top edge highlight -->
    <polyline points="230,0 460,133" fill="none" stroke="#E2F0EE" stroke-width="2.5" stroke-opacity="0.7"/>
    <polyline points="230,0 0,133"   fill="none" stroke="#C8DED9" stroke-width="1.8" stroke-opacity="0.55"/>
    <!-- Top face inner sheen -->
    <polygon points="230,8  430,128  230,248  30,128" fill="white" fill-opacity="0.07"/>

    <!-- FRONT-LEFT face -->
    <polygon points="0,133  230,265  230,532  0,399" fill="url(#tLeft)"/>

    <!-- Corrugation arcs (3 concentric, clipped to face) -->
    <g clip-path="url(#tealFaceClip)" fill="none" stroke="#3D8078" stroke-linecap="round">
      <path d="M 28,192  Q 165,318  95,428" stroke-width="4.5" stroke-opacity="0.58"/>
      <path d="M 12,172  Q 145,308  72,445" stroke-width="4.5" stroke-opacity="0.52"/>
      <path d="M 0,152   Q 125,298  50,462" stroke-width="4.5" stroke-opacity="0.46"/>
    </g>
    <!-- Face edge highlight (left edge) -->
    <line x1="0" y1="133" x2="0" y2="399" stroke="#BED8D4" stroke-width="2" stroke-opacity="0.6"/>
    <!-- Face bottom edge -->
    <line x1="0" y1="399" x2="230" y2="532" stroke="#6A9E98" stroke-width="1.5" stroke-opacity="0.5"/>

    <!-- FRONT-RIGHT face -->
    <polygon points="230,265  460,133  460,399  230,532" fill="url(#tRight)"/>
    <!-- Right face subtle vertical lines -->
    <line x1="307" y1="177" x2="307" y2="444" stroke="#4E8880" stroke-width="1"   stroke-opacity="0.25"/>
    <line x1="384" y1="143" x2="384" y2="421" stroke="#4E8880" stroke-width="1"   stroke-opacity="0.20"/>
    <!-- Right face edge -->
    <line x1="460" y1="133" x2="460" y2="399" stroke="#4E8880" stroke-width="2"   stroke-opacity="0.5"/>
    <!-- Bottom edge of right face -->
    <line x1="460" y1="399" x2="230" y2="532" stroke="#4E8880" stroke-width="1.5" stroke-opacity="0.45"/>

    <!-- Centre vertical seam (edge highlight) -->
    <line x1="230" y1="265" x2="230" y2="532" stroke="#B8D4D0" stroke-width="2.5" stroke-opacity="0.45"/>
  </g>


  <!-- ═══════════════════════════════════════════════ -->
  <!--  BOX 2 – BEIGE/KRAFT CUBE  (right side)       -->
  <!--  scale=1.4 → left edge ≈ 1296                 -->
  <!--  Gap from card ≈ 112px (same as left side)    -->
  <!-- ═══════════════════════════════════════════════ -->
  <g transform="translate(1296, 128) scale(1.4)" filter="url(#boxShadow)">

    <!-- Ground shadow ellipse -->
    <ellipse cx="230" cy="546" rx="220" ry="26" fill="#6A4E28" fill-opacity="0.10"/>

    <!-- TOP face -->
    <polygon points="230,0  460,133  230,265  0,133" fill="url(#bTop)"/>
    <!-- Top edge highlight -->
    <polyline points="230,0 460,133" fill="none" stroke="#FFF4E4" stroke-width="2.5" stroke-opacity="0.75"/>
    <polyline points="230,0 0,133"   fill="none" stroke="#EAD9BF" stroke-width="1.8" stroke-opacity="0.6"/>
    <!-- Top-face gloss sheen -->
    <polygon points="230,8  420,122  400,134  215,20"  fill="white" fill-opacity="0.25"/>
    <polygon points="260,22 390,92  378,102  246,32"  fill="white" fill-opacity="0.14"/>

    <!-- FRONT-LEFT face -->
    <polygon points="0,133  230,265  230,532  0,399" fill="url(#bLeft)"/>

    <!-- Subtle horizontal cardboard texture lines (clipped to face) -->
    <g clip-path="url(#beigeFaceClip)" stroke="#A89070" stroke-opacity="0.14" stroke-width="1.2">
      <line x1="-10" y1="300" x2="240" y2="430"/>
      <line x1="-10" y1="330" x2="240" y2="460"/>
      <line x1="-10" y1="360" x2="240" y2="490"/>
      <line x1="-10" y1="390" x2="240" y2="520"/>
      <line x1="-10" y1="270" x2="240" y2="400"/>
      <line x1="-10" y1="240" x2="240" y2="370"/>
    </g>

    <!-- Diamond gloss highlight (centred on front-left face) -->
    <polygon points="115,292  182,370  115,448  48,370" fill="white" fill-opacity="0.30"/>
    <polygon points="115,308  162,370  115,432  68,370" fill="white" fill-opacity="0.16"/>
    <!-- Bright oval core -->
    <ellipse cx="115" cy="362" rx="30" ry="38" fill="white" fill-opacity="0.20" transform="rotate(-8,115,362)"/>

    <!-- Face edge highlight (left edge) -->
    <line x1="0" y1="133" x2="0" y2="399" stroke="#E8D8BC" stroke-width="2"   stroke-opacity="0.65"/>
    <!-- Face bottom edge -->
    <line x1="0" y1="399" x2="230" y2="532" stroke="#B8A285" stroke-width="1.5" stroke-opacity="0.5"/>

    <!-- FRONT-RIGHT face -->
    <polygon points="230,265  460,133  460,399  230,532" fill="url(#bRight)"/>
    <!-- Right face subtle texture lines -->
    <g stroke="#8A7055" stroke-opacity="0.15" stroke-width="1.2">
      <line x1="230" y1="390" x2="460" y2="260"/>
      <line x1="230" y1="420" x2="460" y2="290"/>
      <line x1="230" y1="450" x2="460" y2="320"/>
      <line x1="230" y1="460" x2="430" y2="340"/>
    </g>
    <!-- Right face edge -->
    <line x1="460" y1="133" x2="460" y2="399" stroke="#A09078" stroke-width="2"   stroke-opacity="0.5"/>
    <!-- Bottom edge of right face -->
    <line x1="460" y1="399" x2="230" y2="532" stroke="#A09078" stroke-width="1.5" stroke-opacity="0.45"/>

    <!-- Centre vertical seam -->
    <line x1="230" y1="265" x2="230" y2="532" stroke="#E8D8BC" stroke-width="2.5" stroke-opacity="0.5"/>
  </g>

</svg>